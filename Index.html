<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>나의 AX 유형테스트</title>
    <style>
      :root {
        --bg1: #fffde7;
        --bg2: #f1f8d7;
        --card: #fffef7;
        --line: #e6ebb2;
        --text: #364016;
        --sub: #6b7447;
        --accent2: #fff176;
        --btn: #9ccc65;
        --btn-hover: #8bc34a;
        --prev: #f0f4c3;
        --result-bg: linear-gradient(180deg, #fffef2, #f6fbd8);
        --result-line: #dce775;
        --error-bg: #fff3e0;
        --error-text: #8a5a1f;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html {
        font-size: 18px;
      }

      body {
        margin: 0;
        font-family: "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
        color: var(--text);
        background:
          linear-gradient(135deg, rgba(255,241,118,0.35), rgba(212,225,87,0.25)),
          linear-gradient(180deg, var(--bg1), var(--bg2));
        padding: 18px;
      }

      .container {
        max-width: 820px;
        margin: 0 auto;
        background: var(--card);
        border: 2px solid var(--line);
        border-radius: 28px;
        padding: 24px 20px 22px;
        box-shadow: 0 12px 30px rgba(160, 180, 80, 0.12);
      }

      h1 {
        margin: 0 0 10px 0;
        font-size: 1.7rem;
        line-height: 1.4;
      }

      .desc {
        margin-bottom: 18px;
        color: var(--sub);
        font-size: 0.95rem;
        line-height: 1.8;
        background: linear-gradient(90deg, rgba(255,241,118,0.25), rgba(212,225,87,0.18));
        border: 1px dashed #dce775;
        border-radius: 18px;
        padding: 16px 16px;
      }

      .progress-wrap {
        margin: 18px 0 20px;
      }

      .progress-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        font-size: 0.92rem;
        color: var(--sub);
      }

      .progress-bar {
        width: 100%;
        height: 14px;
        background: #f4f7d0;
        border-radius: 999px;
        overflow: hidden;
        border: 1px solid #e1e8a8;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #fff176, #aed581);
        border-radius: 999px;
        transition: width 0.25s ease;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: linear-gradient(180deg, #fffef9, #fbfdeb);
        padding: 22px 18px 18px;
      }

      .step-kicker {
        display: inline-block;
        font-size: 0.85rem;
        color: #7a8642;
        background: #f7fbd7;
        border: 1px solid #e4ed9e;
        border-radius: 999px;
        padding: 7px 12px;
        margin-bottom: 14px;
      }

      .question-title {
        font-size: 1.35rem;
        font-weight: 800;
        line-height: 1.55;
        margin-bottom: 12px;
        word-break: keep-all;
      }

      .question-sub {
        font-size: 0.97rem;
        color: var(--sub);
        margin-bottom: 18px;
        line-height: 1.75;
      }

      .option-group label {
        display: block;
        padding: 15px 16px;
        margin-bottom: 12px;
        border: 1px solid #dfe8a5;
        border-radius: 16px;
        background: #fffefb;
        cursor: pointer;
        line-height: 1.7;
        font-size: 1rem;
        transition: 0.15s ease;
      }

      .option-group label:hover {
        background: #fcffe8;
        border-color: #d4e157;
      }

      .option-group label:has(input:checked) {
        background: #fbffe1;
        border-color: #cddc39;
        box-shadow: 0 0 0 3px rgba(205, 220, 57, 0.12);
      }

      input[type="radio"],
      input[type="checkbox"] {
        margin-right: 10px;
        transform: scale(1.15) translateY(1px);
      }

      input[type="text"],
      textarea {
        width: 100%;
        border: 1.5px solid #dce775;
        border-radius: 18px;
        padding: 16px 16px;
        font-size: 1rem;
        background: #fffefb;
        color: var(--text);
      }

      input[type="text"] {
        min-height: 56px;
      }

      input[type="text"]:focus,
      textarea:focus {
        outline: none;
        border-color: #cddc39;
        box-shadow: 0 0 0 4px rgba(205, 220, 57, 0.15);
      }

      textarea {
        min-height: 180px;
        resize: vertical;
        line-height: 1.75;
      }

      .validation {
        margin-top: 14px;
        color: #b26a00;
        font-size: 0.92rem;
        display: none;
        line-height: 1.6;
      }

      .nav {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 22px;
      }

      .nav-right {
        margin-left: auto;
        display: flex;
        gap: 12px;
      }

      button {
        border: none;
        border-radius: 18px;
        padding: 16px 20px;
        font-size: 1rem;
        font-weight: 800;
        cursor: pointer;
        min-height: 56px;
      }

      .btn-prev {
        background: var(--prev);
        color: #546019;
      }

      .btn-next,
      .btn-submit {
        background: linear-gradient(135deg, var(--accent2), var(--btn));
        color: #31410f;
        box-shadow: 0 6px 16px rgba(156, 204, 101, 0.25);
      }

      .btn-next:hover,
      .btn-submit:hover {
        background: linear-gradient(135deg, #fff59d, var(--btn-hover));
      }

      button:disabled {
        background: #dcdcdc !important;
        color: #777 !important;
        cursor: wait;
        box-shadow: none !important;
      }

      .encourage {
        text-align: center;
        margin-top: 18px;
        color: #7b844e;
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .notice {
        margin-top: 22px;
        display: none;
      }

      .result-card {
        background: var(--result-bg);
        border: 2px solid var(--result-line);
        border-radius: 24px;
        padding: 24px 18px;
        box-shadow: 0 10px 22px rgba(205, 220, 57, 0.12);
      }

      .result-top {
        text-align: center;
        margin-bottom: 18px;
      }

      .result-badge {
        display: inline-block;
        padding: 8px 14px;
        border-radius: 999px;
        background: #f7fbd7;
        border: 1px solid #dce775;
        color: #6e7d23;
        font-size: 0.9rem;
        font-weight: 700;
        margin-bottom: 14px;
      }

      .result-title {
        font-size: 1.7rem;
        font-weight: 900;
        line-height: 1.45;
        margin-bottom: 10px;
        color: #31410f;
        word-break: keep-all;
      }

      .result-subtitle {
        font-size: 1.05rem;
        line-height: 1.8;
        color: #556327;
        background: rgba(255,255,255,0.55);
        border: 1px dashed #dce775;
        border-radius: 16px;
        padding: 14px;
      }

      .result-meta {
        margin-top: 18px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .result-meta-item {
        background: #fffef8;
        border: 1px solid #e3eba8;
        border-radius: 16px;
        padding: 14px 12px;
        text-align: center;
      }

      .result-meta-label {
        font-size: 0.82rem;
        color: #7b844e;
        margin-bottom: 6px;
      }

      .result-meta-value {
        font-size: 1.08rem;
        font-weight: 800;
        color: #31410f;
      }

      .result-footer {
        margin-top: 16px;
        padding: 14px;
        border-radius: 16px;
        background: #fffefb;
        border: 1px solid #e8efb8;
        font-size: 0.94rem;
        line-height: 1.75;
        color: #5c6830;
      }

      .error-box {
        padding: 18px 18px;
        border-radius: 16px;
        line-height: 1.8;
        font-size: 0.97rem;
        background: var(--error-bg);
        color: var(--error-text);
        border: 1px solid #ffe0b2;
      }

      @media (max-width: 640px) {
        html {
          font-size: 19px;
        }

        body {
          padding: 10px 10px 110px;
        }

        .container {
          padding: 16px 12px 16px;
          border-radius: 20px;
        }

        h1 {
          font-size: 1.45rem;
          line-height: 1.45;
        }

        .desc {
          font-size: 0.98rem;
          padding: 15px 14px;
          border-radius: 16px;
        }

        .progress-top {
          font-size: 0.95rem;
        }

        .card {
          padding: 18px 14px 16px;
          border-radius: 18px;
        }

        .step-kicker {
          font-size: 0.82rem;
          padding: 7px 11px;
        }

        .question-title {
          font-size: 1.28rem;
          line-height: 1.6;
          margin-bottom: 10px;
        }

        .question-sub {
          font-size: 0.98rem;
          line-height: 1.75;
          margin-bottom: 16px;
        }

        .option-group label {
          padding: 16px 14px;
          font-size: 1rem;
          border-radius: 15px;
          line-height: 1.7;
        }

        input[type="radio"],
        input[type="checkbox"] {
          transform: scale(1.18) translateY(1px);
          margin-right: 11px;
        }

        input[type="text"],
        textarea {
          font-size: 1rem;
          padding: 16px 14px;
          border-radius: 16px;
        }

        textarea {
          min-height: 170px;
        }

        .nav {
          position: sticky;
          bottom: max(10px, env(safe-area-inset-bottom));
          background: rgba(255, 254, 247, 0.96);
          backdrop-filter: blur(8px);
          border: 1px solid #e5ecaf;
          border-radius: 18px;
          padding: 10px;
          margin-top: 22px;
          flex-direction: column-reverse;
          gap: 10px;
          box-shadow: 0 10px 24px rgba(170, 190, 90, 0.18);
        }

        .nav-right {
          margin-left: 0;
          width: 100%;
          display: flex;
          gap: 10px;
        }

        .nav button {
          width: 100%;
          font-size: 1rem;
          min-height: 58px;
          border-radius: 16px;
        }

        .encourage {
          font-size: 0.95rem;
          margin-top: 16px;
        }

        .result-card {
          padding: 22px 14px;
          border-radius: 20px;
        }

        .result-title {
          font-size: 1.5rem;
          line-height: 1.5;
        }

        .result-subtitle {
          font-size: 1rem;
          line-height: 1.8;
          padding: 13px;
        }

        .result-meta {
          grid-template-columns: 1fr;
        }

        .result-meta-value {
          font-size: 1.05rem;
        }

        .result-footer {
          font-size: 0.96rem;
        }

        .error-box {
          font-size: 0.98rem;
          padding: 16px 14px;
          border-radius: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🌼 나의 AX 유형테스트 🍋</h1>

      <div class="desc">
        안녕하세요 💛<br>
        이 테스트는 팀 내 AI 활용 현황을 가볍게 파악하고, 앞으로 더 잘 쓰기 위한 맞춤형 AX 지원 방향을 함께 찾기 위해 준비했습니다.<br>
        질문은 한 개씩 차근차근 나옵니다. 편하게 답해주세요 🌱
      </div>

      <div class="progress-wrap">
        <div class="progress-top">
          <span id="progressText">1 / 9</span>
          <span id="progressPercent">11%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="card">
        <div class="step-kicker" id="stepKicker">🐣 첫 질문</div>
        <div class="question-title" id="questionTitle"></div>
        <div class="question-sub" id="questionSub"></div>

        <div id="questionBody"></div>
        <div class="validation" id="validationMsg"></div>

        <div class="nav">
          <button type="button" class="btn-prev" id="prevBtn">← 이전</button>
          <div class="nav-right">
            <button type="button" class="btn-next" id="nextBtn">다음 →</button>
            <button type="button" class="btn-submit" id="submitBtn" style="display:none;">🌻 제출하기</button>
          </div>
        </div>

        <div class="encourage" id="encourageMsg">☀️ 가볍게 시작해볼까요?</div>
      </div>

      <div id="notice" class="notice"></div>
    </div>

    <script>
      const questions = [
        {
          key: 'nickname',
          type: 'text',
          title: '🐣 0. 별명',
          sub: '이름 대신, 팀에서 사용하는 편한 별명을 적어주세요.',
          placeholder: '별명을 입력해주세요',
          required: true
        },
        {
          key: 'q1',
          type: 'radio',
          title: '📌 1. 현재 업무에서 AI를 활용하는 빈도는 어느 정도인가요?',
          sub: '지금 내 업무 흐름 안에 AI가 어느 정도 들어와 있는지 떠올려보면 됩니다.',
          required: true,
          options: [
            '거의 사용하지 않는다',
            '가끔 생각날 때만 사용한다',
            '일부 업무에서는 자주 사용한다',
            '대부분의 업무에서 보조도구처럼 사용한다',
            '업무 흐름에 거의 기본값처럼 포함되어 있다'
          ]
        },
        {
          key: 'q2',
          type: 'checkbox',
          title: '🛠️ 2. 현재 가장 자주 사용하는 AI 도구는 무엇인가요?',
          sub: '복수선택 가능해요. 가장 자주 쓰는 도구를 자유롭게 골라주세요.',
          required: true,
          minSelect: 1,
          options: [
            '사용 중인 AI 도구가 없다',
            'ChatGPT',
            'Claude',
            'Gemini',
            'Perplexity',
            'Notion AI',
            'Canva AI',
            'Gamma',
            '이미지 생성 AI',
            '회의록 요약 AI',
            '기타'
          ]
        },
        {
          key: 'q3',
          type: 'checkbox',
          title: '💼 3. AI를 주로 어떤 업무에 활용하고 있나요?',
          sub: '복수선택 가능해요. 현재 가장 많이 연결되는 실무를 골라주세요.',
          required: true,
          minSelect: 1,
          options: [
            '아직 업무 활용 사례가 거의 없다',
            '문장 작성/교정',
            '요약/정리',
            '번역',
            '리서치',
            '기획안 초안 작성',
            '보고서/제안서 작성',
            '회의록 정리',
            '이미지 제작',
            '데이터/문서 분석',
            '반복업무 자동화 아이디어 구상',
            '기타'
          ]
        },
        {
          key: 'q4',
          type: 'textarea',
          title: '✨ 4. 가장 유용했던 활용 사례가 있으면 적어주세요.',
          sub: '이 문항은 빈칸이어도 괜찮아요.',
          placeholder: '예: 제안서 초안 작성, 회의록 정리, 아이디어 구조화 등',
          required: false
        },
        {
          key: 'q5',
          type: 'radio',
          title: '🎯 5. AI를 사용할 때 느끼는 익숙함 또는 자신감은 어느 정도인가요?',
          sub: '결과를 얻기 위해 질문을 다듬거나 방향을 조정하는 익숙함을 떠올려보면 됩니다.',
          required: true,
          options: [
            '어떻게 물어봐야 할지 잘 모르겠다',
            '기본적인 요청만 가능하다',
            '원하는 결과를 얻기 위해 질문을 조금씩 조정할 수 있다',
            '업무 목적에 맞게 비교적 정교하게 요청할 수 있다',
            '프롬프트를 설계하고 결과를 다듬어 실무에 안정적으로 적용할 수 있다'
          ]
        },
        {
          key: 'q6',
          type: 'textarea',
          title: '🤔 6. AI를 쓸 때 가장 어려운 점을 적어주세요.',
          sub: '이 문항도 빈칸이어도 괜찮아요.',
          placeholder: '예: 질문하는 법, 결과 품질, 보안 우려, 시간 대비 효율, 툴 선택 등',
          required: false
        },
        {
          key: 'q7',
          type: 'radio',
          title: '🚀 7. 앞으로 AX 지원이 가장 필요한 수준은 어디에 가깝나요?',
          sub: '지금 나에게 가장 도움이 될 지원이 무엇인지 기준으로 골라주세요.',
          required: true,
          options: [
            'AI를 왜 써야 하는지부터 감이 필요하다',
            '내 업무에 어디에 붙일 수 있을지 사례가 필요하다',
            '잘 쓰는 방법과 프롬프트 예시가 필요하다',
            '반복업무를 줄이는 실질적 방법이 필요하다',
            '팀 차원의 업무 프로세스 개선/자동화까지 함께 설계하고 싶다'
          ]
        },
        {
          key: 'q8',
          type: 'textarea',
          title: '💌 8. AXC에게 가장 받고 싶은 지원을 자유롭게 적어주세요.',
          sub: '이 문항은 빈칸이어도 괜찮아요. 마지막 질문입니다 🌼',
          placeholder: '예: 프롬프트 예시, 내 업무 맞춤 사례, 자동화 아이디어 정리 등',
          required: false
        }
      ];

      const encouragements = [
        '☀️ 가볍게 시작해볼까요?',
        '🌱 좋아요, 한 걸음씩 보고 있어요.',
        '🍋 지금까지 아주 좋습니다.',
        '🌼 데이터가 차곡차곡 쌓이고 있어요.',
        '🐝 벌써 절반 가까이 왔어요.',
        '🌿 아주 좋아요, 흐름이 보이기 시작해요.',
        '🍯 거의 다 왔어요.',
        '🌻 마지막 전 단계예요.',
        '💛 마지막 질문까지 함께 가볼게요.'
      ];

      const levelEmojiMap = {
        'AX병아리': '🐣',
        'AX새싹': '🌱',
        'AX실무러': '🛠️',
        'AX파일럿': '🚀',
        'AX챔피언': '🏆'
      };

      let currentStep = 0;
      const answers = {
        nickname: '',
        q1: '',
        q2: [],
        q3: [],
        q4: '',
        q5: '',
        q6: '',
        q7: '',
        q8: ''
      };

      const questionTitle = document.getElementById('questionTitle');
      const questionSub = document.getElementById('questionSub');
      const questionBody = document.getElementById('questionBody');
      const validationMsg = document.getElementById('validationMsg');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const submitBtn = document.getElementById('submitBtn');
      const progressText = document.getElementById('progressText');
      const progressPercent = document.getElementById('progressPercent');
      const progressFill = document.getElementById('progressFill');
      const stepKicker = document.getElementById('stepKicker');
      const encourageMsg = document.getElementById('encourageMsg');
      const notice = document.getElementById('notice');

      function renderStep() {
        const q = questions[currentStep];
        const total = questions.length;
        const percent = Math.round(((currentStep + 1) / total) * 100);

        progressText.textContent = `${currentStep + 1} / ${total}`;
        progressPercent.textContent = `${percent}%`;
        progressFill.style.width = `${percent}%`;
        stepKicker.textContent = currentStep === total - 1 ? '🌻 마지막 질문' : `🌼 질문 ${currentStep + 1}`;
        encourageMsg.textContent = encouragements[currentStep] || '💛';

        questionTitle.textContent = q.title;
        questionSub.textContent = q.sub || '';
        validationMsg.style.display = 'none';
        validationMsg.textContent = '';

        prevBtn.style.visibility = currentStep === 0 ? 'hidden' : 'visible';
        nextBtn.style.display = currentStep === questions.length - 1 ? 'none' : 'inline-block';
        submitBtn.style.display = currentStep === questions.length - 1 ? 'inline-block' : 'none';

        questionBody.innerHTML = buildQuestionHtml(q);
        restoreValue(q);
      }

      function buildQuestionHtml(q) {
        if (q.type === 'text') {
          return `<input type="text" id="${q.key}" placeholder="${q.placeholder || ''}" />`;
        }

        if (q.type === 'textarea') {
          return `<textarea id="${q.key}" placeholder="${q.placeholder || ''}"></textarea>`;
        }

        if (q.type === 'radio') {
          return `
            <div class="option-group">
              ${q.options.map((opt, idx) => `
                <label>
                  <input type="radio" name="${q.key}" value="${escapeHtml(opt)}" id="${q.key}_${idx}">
                  ${escapeHtml(opt)}
                </label>
              `).join('')}
            </div>
          `;
        }

        if (q.type === 'checkbox') {
          return `
            <div class="option-group">
              ${q.options.map((opt, idx) => `
                <label>
                  <input type="checkbox" name="${q.key}" value="${escapeHtml(opt)}" id="${q.key}_${idx}">
                  ${escapeHtml(opt)}
                </label>
              `).join('')}
            </div>
          `;
        }

        return '';
      }

      function restoreValue(q) {
        if (q.type === 'text' || q.type === 'textarea') {
          const el = document.getElementById(q.key);
          if (el) el.value = answers[q.key] || '';
          return;
        }

        if (q.type === 'radio') {
          const val = answers[q.key];
          if (!val) return;
          const inputs = document.querySelectorAll(`input[name="${q.key}"]`);
          inputs.forEach(input => {
            input.checked = input.value === val;
          });
          return;
        }

        if (q.type === 'checkbox') {
          const vals = answers[q.key] || [];
          const inputs = document.querySelectorAll(`input[name="${q.key}"]`);
          inputs.forEach(input => {
            input.checked = vals.includes(input.value);
          });
        }
      }

      function saveCurrentValue() {
        const q = questions[currentStep];

        if (q.type === 'text' || q.type === 'textarea') {
          const el = document.getElementById(q.key);
          answers[q.key] = el ? el.value.trim() : '';
          return;
        }

        if (q.type === 'radio') {
          const checked = document.querySelector(`input[name="${q.key}"]:checked`);
          answers[q.key] = checked ? checked.value : '';
          return;
        }

        if (q.type === 'checkbox') {
          const checked = Array.from(document.querySelectorAll(`input[name="${q.key}"]:checked`)).map(el => el.value);
          answers[q.key] = checked;
        }
      }

      function validateCurrentStep() {
        saveCurrentValue();
        const q = questions[currentStep];
        const value = answers[q.key];

        if (!q.required) return true;

        if (q.type === 'text' || q.type === 'textarea') {
          if (!value || !String(value).trim()) {
            showValidation('이 문항은 입력 후 다음으로 넘어갈 수 있어요 🙂');
            return false;
          }
        }

        if (q.type === 'radio') {
          if (!value) {
            showValidation('하나를 선택해주시면 다음으로 넘어갈 수 있어요 🙂');
            return false;
          }
        }

        if (q.type === 'checkbox') {
          const count = Array.isArray(value) ? value.length : 0;
          const minSelect = q.minSelect || 1;
          if (count < minSelect) {
            showValidation(`최소 ${minSelect}개 이상 선택해주시면 다음으로 넘어갈 수 있어요 🙂`);
            return false;
          }
        }

        return true;
      }

      function showValidation(msg) {
        validationMsg.textContent = msg;
        validationMsg.style.display = 'block';
      }

      function getLevelDescription(level) {
        const map = {
          'AX병아리': 'AI 활용의 첫 단계를 시작하는 중입니다. 기본 사용법과 내 업무에 맞는 사례를 접하면 빠르게 익숙해질 수 있어요.',
          'AX새싹': '일부 활용 경험이 있는 단계입니다. 내 업무 흐름에 자연스럽게 연결하는 연습을 하면 활용 폭이 더 넓어질 수 있어요.',
          'AX실무러': '실무에서 AI를 이미 활용하고 있는 단계입니다. 프롬프트 정교화와 반복 패턴 정리를 통해 효율을 더 끌어올릴 수 있어요.',
          'AX파일럿': '여러 업무 흐름 안에서 AI를 적극적으로 활용하는 단계입니다. 개인 활용을 넘어 팀 차원의 효율화로 확장할 가능성이 커요.',
          'AX챔피언': 'AI를 생산성과 개선 관점에서 주도적으로 활용하는 단계입니다. 사례 공유와 동료 코칭까지 이어질 수 있는 수준이에요.'
        };
        return map[level] || '현재 활용 수준을 바탕으로 다음 AX 실험을 함께 설계해볼 수 있어요.';
      }

      function renderResult(response) {
        const levelEmoji = levelEmojiMap[response.level] || '🌼';
        const levelDescription = getLevelDescription(response.level);

        notice.innerHTML = `
          <div class="result-card">
            <div class="result-top">
              <div class="result-badge">제출 완료</div>
              <div class="result-title">짜잔~ ${levelEmoji} 당신은 <br>${response.level} 입니다!</div>
              <div class="result-subtitle">
                ${levelDescription}
              </div>
            </div>

            <div class="result-meta">
              <div class="result-meta-item">
                <div class="result-meta-label">유형</div>
                <div class="result-meta-value">${response.type}</div>
              </div>
              <div class="result-meta-item">
                <div class="result-meta-label">총점</div>
                <div class="result-meta-value">${response.totalScore}점</div>
              </div>
              <div class="result-meta-item">
                <div class="result-meta-label">저장 위치</div>
                <div class="result-meta-value">${response.message}</div>
              </div>
              <div class="result-meta-item">
                <div class="result-meta-label">제출시간</div>
                <div class="result-meta-value">${response.submittedAt}</div>
              </div>
            </div>

            <div class="result-footer">
              지금의 활용 수준을 확인한 첫 출발점입니다.<br>
              이 결과를 바탕으로 앞으로 더 잘 맞는 AX 지원을 설계해볼 수 있습니다.
            </div>
          </div>
        `;
      }

      prevBtn.addEventListener('click', () => {
        saveCurrentValue();
        if (currentStep > 0) {
          currentStep -= 1;
          renderStep();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });

      nextBtn.addEventListener('click', () => {
        if (!validateCurrentStep()) return;
        if (currentStep < questions.length - 1) {
          currentStep += 1;
          renderStep();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });

      submitBtn.addEventListener('click', () => {
        if (!validateCurrentStep()) return;

        submitBtn.disabled = true;
        submitBtn.textContent = '제출 중...';
        notice.style.display = 'none';
        notice.className = 'notice';

        google.script.run
          .withSuccessHandler(function(response) {
            submitBtn.disabled = false;
            submitBtn.textContent = '제출하기';
            notice.style.display = 'block';

            if (response.success) {
              renderResult(response);
              document.querySelector('.card').style.display = 'none';
              document.querySelector('.progress-wrap').style.display = 'none';
              window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
              notice.innerHTML = `<div class="error-box">오류가 발생했습니다.<br>${response.message}</div>`;
            }
          })
          .withFailureHandler(function(error) {
            submitBtn.disabled = false;
            submitBtn.textContent = '제출하기';
            notice.style.display = 'block';
            notice.innerHTML = `<div class="error-box">스크립트 실행 중 오류가 발생했습니다.<br>${error.message}</div>`;
          })
          .submitSurvey(answers);
      });

      function escapeHtml(str) {
        return String(str)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      renderStep();
    </script>
  </body>
</html>
